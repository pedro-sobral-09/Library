<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Library</h1>
        <button id="btn-add">Add Book</button>
    </header>
    <main id="library">
        
    </main>
    <footer>
        <p>Build by <a href="https://github.com/pedro-sobral-09" target="_blank">Pedro Sobral</a></p>
    </footer>
    <dialog id="dialog-books">
        <form id="form-dialog">
            <label for="input-title" id="label-title">Title: </label>
            <input type="text" required id="input-title" name="title">

            <label for="input-author" id="label-author">Author: </label>
            <input type="text" required id="input-author" name="author">

            <label for="input-pages" id="label-pages">Pages: </label>
            <input type="number" required id="input-pages" name="pages">

            <label for="input-status" id="label-status">Status: </label>
            <select id="input-status" required name="status">
                <option value="" disabled selected>Select</option>
                <option value="To read">To read</option>
                <option value="Reading">Reading</option>
                <option value="Read">Read</option>
            </select>
            <button id="btn-close" type="button">Close</button>
            <button id="btn-confirm" type="submit">Confirm</button>
        </form>
    </dialog>
    <script src="script.js"></script>
</body>
</html>
